<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baggalpe — Test Simulator</title>
<style>
/* ================================================================
   WhatsApp Dark Mode Theme
   ================================================================ */
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-app:       #0b141a;
  --bg-chat:      #0b141a;
  --bg-header:    #1f2c34;
  --bg-input:     #1f2c34;
  --bg-incoming:  #1f2c34;
  --bg-outgoing:  #005c4b;
  --text-primary: #e9edef;
  --text-secondary:#8696a0;
  --accent-green: #00a884;
  --accent-green-light: #25d366;
  --border-color: #2a3942;
  --font-family:  'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-app);
  color: var(--text-primary);
  font-family: var(--font-family);
}

/* ---- Container ---- */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  border-left: 1px solid var(--border-color);
  border-right: 1px solid var(--border-color);
}

/* ---- Header ---- */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
#header .info {
  display: flex;
  align-items: center;
  gap: 12px;
}
#header .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent-green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
#header .name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
#header .subtitle {
  font-size: 12px;
  color: var(--text-secondary);
}
#header .actions button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background .2s, color .2s;
}
#header .actions button:hover {
  background: rgba(255,255,255,.07);
  color: var(--text-primary);
}

/* ---- Chat area ---- */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='40' height='40' patternUnits='userSpaceOnUse'%3E%3Ccircle cx='20' cy='20' r='1' fill='%23ffffff08'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='200' height='200' fill='url(%23p)'/%3E%3C/svg%3E");
}
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

/* ---- System message ---- */
.system-msg {
  align-self: center;
  background: rgba(31,44,52,.85);
  color: var(--text-secondary);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 8px;
  margin: 8px 0;
  text-align: center;
  max-width: 85%;
}

/* ---- Bubbles ---- */
.bubble-row {
  display: flex;
  animation: fadeUp .25s ease;
}
.bubble-row.incoming { justify-content: flex-start; }
.bubble-row.outgoing { justify-content: flex-end; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.bubble {
  max-width: 80%;
  padding: 8px 12px 6px;
  border-radius: 10px;
  position: relative;
  font-size: 14.2px;
  line-height: 1.45;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.incoming .bubble {
  background: var(--bg-incoming);
  border-top-left-radius: 2px;
}
.outgoing .bubble {
  background: var(--bg-outgoing);
  border-top-right-radius: 2px;
}
.bubble .time {
  display: block;
  text-align: right;
  font-size: 11px;
  color: rgba(255,255,255,.45);
  margin-top: 4px;
}

/* ---- Button pills ---- */
.button-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.button-pill {
  background: transparent;
  color: var(--accent-green-light);
  border: 1px solid var(--accent-green);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-family);
  transition: background .2s, color .2s;
}
.button-pill:hover {
  background: var(--accent-green);
  color: #fff;
}

/* ---- Typing indicator ---- */
.typing-indicator {
  display: none;
  align-self: flex-start;
}
.typing-indicator.visible { display: flex; }
.typing-indicator .bubble {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  background: var(--bg-incoming);
  border-top-left-radius: 2px;
}
.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-secondary);
  animation: typingBounce 1.2s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30%           { transform: translateY(-6px); }
}

/* ---- Input bar ---- */
#input-bar {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  background: var(--bg-header);
  border-top: 1px solid var(--border-color);
  gap: 8px;
  flex-shrink: 0;
}
#msg-input {
  flex: 1;
  background: #2a3942;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  padding: 10px 16px;
  border-radius: 24px;
  font-family: var(--font-family);
}
#msg-input::placeholder { color: var(--text-secondary); }
#send-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent-green);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform .15s;
}
#send-btn:active { transform: scale(.92); }

/* ---- Responsive ---- */
@media (max-width: 540px) {
  #app { max-width: 100%; border: none; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="info">
      <div class="avatar">🛒</div>
      <div>
        <div class="name">Baggalpe AI</div>
        <div class="subtitle">Test Simulator</div>
      </div>
    </div>
    <div class="actions">
      <button id="clear-btn" title="Clear chat">🗑️ Clear</button>
    </div>
  </div>

  <!-- Chat Messages -->
  <div id="chat">
    <!-- Typing indicator (hidden by default) -->
    <div class="typing-indicator" id="typing">
      <div class="bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send-btn" title="Send">&#10148;</button>
  </div>
</div>

<script>
// =========================================================================
//  Baggalpe Test Simulator — Client-side Logic
// =========================================================================

const API_URL  = '/api/test';
const PHONE_ID = 'test_user';

const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('msg-input');
const sendBtn  = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const typingEl = document.getElementById('typing');

/** Return a formatted timestamp string (HH:MM) */
function timeStamp() {
  const d = new Date();
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/** Scroll the chat to the very bottom */
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatEl.scrollTop = chatEl.scrollHeight;
  });
}

/**
 * Append a message bubble to the chat.
 * @param {'incoming'|'outgoing'|'system'} dir  Direction
 * @param {string} text  Message content
 * @param {Array}  [buttons]  Optional button list
 */
function addBubble(dir, text, buttons) {
  if (dir === 'system') {
    const sys = document.createElement('div');
    sys.className = 'system-msg';
    sys.textContent = text;
    // Insert before the typing indicator
    chatEl.insertBefore(sys, typingEl);
    scrollToBottom();
    return;
  }

  const row = document.createElement('div');
  row.className = 'bubble-row ' + dir;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Message text
  const msgSpan = document.createElement('span');
  msgSpan.textContent = text;
  bubble.appendChild(msgSpan);

  // Buttons (for bot responses)
  if (buttons && buttons.length) {
    const pillsDiv = document.createElement('div');
    pillsDiv.className = 'button-pills';
    buttons.forEach((btn) => {
      const pill = document.createElement('button');
      pill.className = 'button-pill';
      pill.textContent = btn.title || btn.text || btn;
      pill.addEventListener('click', () => {
        sendMessage(pill.textContent);
      });
      pillsDiv.appendChild(pill);
    });
    bubble.appendChild(pillsDiv);
  }

  // Timestamp
  const ts = document.createElement('span');
  ts.className = 'time';
  ts.textContent = timeStamp();
  bubble.appendChild(ts);

  row.appendChild(bubble);
  chatEl.insertBefore(row, typingEl);
  scrollToBottom();
}

/** Show / hide the typing indicator */
function setTyping(visible) {
  typingEl.classList.toggle('visible', visible);
  if (visible) scrollToBottom();
}

/**
 * Send a message to the backend and render the response.
 * @param {string} text  User message
 */
async function sendMessage(text) {
  text = text.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.focus();

  // Render outgoing bubble immediately
  addBubble('outgoing', text);

  // Show typing indicator
  setTyping(true);

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: PHONE_ID, message: text }),
    });

    const data = await res.json();

    setTyping(false);

    if (data.responses && data.responses.length) {
      data.responses.forEach((r) => {
        addBubble('incoming', r.text, r.buttons);
      });
    } else {
      addBubble('incoming', '(no response)');
    }
  } catch (err) {
    setTyping(false);
    addBubble('incoming', '⚠️ Could not reach the server. Is it running on port 4000?');
    console.error('Fetch error:', err);
  }
}

// ---- Event Listeners ----

sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

clearBtn.addEventListener('click', () => {
  // Remove everything except the typing indicator
  while (chatEl.firstChild && chatEl.firstChild !== typingEl) {
    chatEl.removeChild(chatEl.firstChild);
  }
  addWelcome();
});

/** Add a welcome system message */
function addWelcome() {
  addBubble(
    'system',
    'Welcome to Baggalpe Test Simulator! Type a message in Hindi or English to start shopping. 🛒'
  );
}

// ---- Init ----
addWelcome();
inputEl.focus();
</script>
</body>
</html>
